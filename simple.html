<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stake.gg - Simple Version</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            color: white;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo {
            font-size: 3rem;
            color: #4ecdc4;
            margin-bottom: 10px;
        }
        .nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
        }
        .nav-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
        }
        .nav-btn:hover {
            background: #5a67d8;
        }
        .nav-btn.active {
            background: #4ecdc4;
        }
        .wallet {
            text-align: center;
            margin: 20px 0;
        }
        .balance {
            background: #2d3748;
            padding: 15px;
            border-radius: 10px;
            display: inline-block;
            margin: 10px;
        }
        .wallet-btn {
            background: #4ecdc4;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin: 5px;
        }
        .game-container {
            display: none;
            background: #2d3748;
            padding: 30px;
            border-radius: 15px;
            margin: 20px 0;
        }
        .game-container.active {
            display: block;
        }
        .game-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .crash-controls {
            background: #1a202c;
            padding: 20px;
            border-radius: 10px;
            max-width: 300px;
            margin: 0 auto;
        }
        .crash-controls input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: none;
            border-radius: 5px;
            background: #2d3748;
            color: white;
        }
        .bet-btn {
            width: 100%;
            background: #667eea;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px 0;
        }
        .bet-btn:hover {
            background: #5a67d8;
        }
        .multiplier {
            font-size: 3rem;
            color: #4ecdc4;
            text-align: center;
            margin: 20px 0;
        }
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #2d3748;
            color: white;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #4ecdc4;
            z-index: 1000;
        }
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">Stake.gg</div>
            <div class="nav">
                <button class="nav-btn active" onclick="switchGame('crash')">🚀 Crash</button>
                <button class="nav-btn" onclick="switchGame('mines')">💣 Mines</button>
                <button class="nav-btn" onclick="switchGame('wheel')">🎡 Wheel</button>
            </div>
            <div class="wallet">
                <div class="balance">Balance: <span id="balance">1.000</span> SOL</div>
                <button class="wallet-btn" onclick="connectWallet()">Connect Wallet</button>
                <button class="wallet-btn" onclick="deposit()">Deposit</button>
                <button class="wallet-btn" onclick="withdraw()">Withdraw</button>
            </div>
        </div>

        <!-- Crash Game -->
        <div class="game-container active" id="crash-game">
            <div class="game-header">
                <h2>🚀 Crash Game</h2>
                <p>Cash out before the rocket crashes!</p>
            </div>
            <div class="multiplier" id="crash-multiplier">1.00x</div>
            <div class="crash-controls">
                <input type="number" id="crash-bet" placeholder="Bet Amount" value="0.1" min="0.01" step="0.01">
                <input type="number" id="crash-auto" placeholder="Auto Cashout" value="2.0" min="1.01" step="0.01">
                <button class="bet-btn" onclick="placeBet()">Place Bet</button>
                <button class="bet-btn hidden" id="cashout-btn" onclick="cashOut()">Cash Out</button>
            </div>
        </div>

        <!-- Mines Game -->
        <div class="game-container" id="mines-game">
            <div class="game-header">
                <h2>💣 Mines Game</h2>
                <p>Find gems, avoid mines!</p>
            </div>
            <div style="text-align: center;">
                <input type="number" placeholder="Bet Amount" value="0.1" style="padding: 10px; margin: 10px;">
                <button class="bet-btn" style="width: auto; padding: 10px 20px;">Start Game</button>
            </div>
        </div>

        <!-- Wheel Game -->
        <div class="game-container" id="wheel-game">
            <div class="game-header">
                <h2>🎡 Wheel Game</h2>
                <p>Spin to win!</p>
            </div>
            <div style="text-align: center;">
                <div style="width: 200px; height: 200px; border-radius: 50%; background: conic-gradient(#ff6b6b 0deg 144deg, #4ecdc4 144deg 202deg, #667eea 202deg 230deg, #ffd700 230deg 360deg); margin: 20px auto;"></div>
                <button class="bet-btn" style="width: auto; padding: 15px 30px;">Spin Wheel</button>
            </div>
        </div>
    </div>

    <script>
        let balance = 1.0;
        let isPlaying = false;
        let multiplier = 1.0;
        let crashPoint = 2.5;
        let startTime = 0;

        function switchGame(game) {
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            document.querySelectorAll('.game-container').forEach(container => container.classList.remove('active'));
            document.getElementById(game + '-game').classList.add('active');
        }

                 function connectWallet() {
             showToast('Wallet connected! Deposit address: AatBYUNhL3HbnrpBfMxwxbTmRYwzL1jU8YFtkFjAkSQt');
         }

         function deposit() {
             showToast('Send SOL to: AatBYUNhL3HbnrpBfMxwxbTmRYwzL1jU8YFtkFjAkSQt');
         }

        function withdraw() {
            showToast('Withdrawal initiated! (This is fake - funds stay in your account)', 'success');
        }

        function placeBet() {
            if (isPlaying) return;
            
            const betAmount = parseFloat(document.getElementById('crash-bet').value);
            if (betAmount > balance || betAmount <= 0) {
                showToast('Invalid bet amount!', 'error');
                return;
            }

            balance -= betAmount;
            updateBalance();
            startCrashGame();
        }

        function startCrashGame() {
            isPlaying = true;
            multiplier = 1.0;
            crashPoint = Math.random() * 5 + 1.1; // Random between 1.1x and 6.1x
            startTime = Date.now();
            
            document.querySelector('.bet-btn').classList.add('hidden');
            document.getElementById('cashout-btn').classList.remove('hidden');
            
            animateCrash();
        }

        function animateCrash() {
            if (!isPlaying) return;
            
            const elapsed = (Date.now() - startTime) / 1000;
            multiplier = 1 + elapsed * 0.5; // Increase by 0.5x per second
            
            document.getElementById('crash-multiplier').textContent = multiplier.toFixed(2) + 'x';
            
            if (multiplier >= crashPoint) {
                crash();
                return;
            }
            
            requestAnimationFrame(animateCrash);
        }

        function crash() {
            isPlaying = false;
            document.getElementById('crash-multiplier').textContent = 'CRASHED!';
            document.getElementById('crash-multiplier').style.color = '#ff6b6b';
            
            showToast(`Crashed at ${crashPoint.toFixed(2)}x!`, 'error');
            resetGame();
        }

        function cashOut() {
            if (!isPlaying) return;
            
            const betAmount = parseFloat(document.getElementById('crash-bet').value);
            const winAmount = betAmount * multiplier;
            
            balance += winAmount;
            updateBalance();
            
            isPlaying = false;
            showToast(`Cashed out at ${multiplier.toFixed(2)}x! Won ${winAmount.toFixed(3)} SOL`, 'success');
            resetGame();
        }

        function resetGame() {
            setTimeout(() => {
                document.querySelector('.bet-btn').classList.remove('hidden');
                document.getElementById('cashout-btn').classList.add('hidden');
                document.getElementById('crash-multiplier').textContent = '1.00x';
                document.getElementById('crash-multiplier').style.color = '#4ecdc4';
            }, 3000);
        }

        function updateBalance() {
            document.getElementById('balance').textContent = balance.toFixed(3);
        }

        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            
            if (type === 'error') {
                toast.style.borderLeftColor = '#ff6b6b';
            } else if (type === 'success') {
                toast.style.borderLeftColor = '#4ecdc4';
            }
            
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, 5000);
        }
    </script>
</body>
</html>
