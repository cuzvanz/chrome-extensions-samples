<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stake.gg - Online Casino Games</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="container">
                <div class="logo">
                    <h1>Stake.gg</h1>
                </div>
                <nav class="nav">
                    <button class="nav-btn active" data-game="crash">
                        <i class="fas fa-chart-line"></i>
                        Crash
                    </button>
                    <button class="nav-btn" data-game="mines">
                        <i class="fas fa-bomb"></i>
                        Mines
                    </button>
                    <button class="nav-btn" data-game="wheel">
                        <i class="fas fa-circle-notch"></i>
                        Wheel
                    </button>
                </nav>
                <div class="wallet">
                    <div class="balance">
                        <i class="fas fa-coins"></i>
                        <span id="balance">1000.00</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main">
            <div class="container">
                <!-- Crash Game -->
                <div class="game-container active" id="crash-game">
                    <div class="game-header">
                        <h2>Crash</h2>
                        <p>Cash out before the rocket crashes!</p>
                    </div>
                    <div class="crash-display">
                        <div class="crash-chart">
                            <canvas id="crash-canvas"></canvas>
                            <div class="multiplier" id="crash-multiplier">1.00x</div>
                            <div class="rocket" id="rocket">🚀</div>
                        </div>
                        <div class="crash-controls">
                            <div class="bet-section">
                                <label>Bet Amount</label>
                                <input type="number" id="crash-bet" value="10" min="1" max="1000">
                            </div>
                            <div class="auto-cashout">
                                <label>Auto Cash Out</label>
                                <input type="number" id="crash-auto" value="2" min="1.01" step="0.01">
                            </div>
                            <button class="bet-btn" id="crash-bet-btn">Place Bet</button>
                            <button class="cashout-btn hidden" id="crash-cashout-btn">Cash Out</button>
                        </div>
                    </div>
                </div>

                <!-- Mines Game -->
                <div class="game-container" id="mines-game">
                    <div class="game-header">
                        <h2>Mines</h2>
                        <p>Find the gems, avoid the mines!</p>
                    </div>
                    <div class="mines-display">
                        <div class="mines-config">
                            <div class="config-group">
                                <label>Bet Amount</label>
                                <input type="number" id="mines-bet" value="10" min="1" max="1000">
                            </div>
                            <div class="config-group">
                                <label>Number of Mines</label>
                                <select id="mines-count">
                                    <option value="3">3 Mines</option>
                                    <option value="5" selected>5 Mines</option>
                                    <option value="10">10 Mines</option>
                                    <option value="15">15 Mines</option>
                                </select>
                            </div>
                            <button class="bet-btn" id="mines-start-btn">Start Game</button>
                            <button class="cashout-btn hidden" id="mines-cashout-btn">Cash Out</button>
                        </div>
                        <div class="mines-grid" id="mines-grid"></div>
                        <div class="mines-info">
                            <div class="current-multiplier">
                                Multiplier: <span id="mines-multiplier">0.00x</span>
                            </div>
                            <div class="potential-win">
                                Potential Win: <span id="mines-potential">0.00</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Wheel Game -->
                <div class="game-container" id="wheel-game">
                    <div class="game-header">
                        <h2>Wheel</h2>
                        <p>Spin the wheel and win big!</p>
                    </div>
                    <div class="wheel-display">
                        <div class="wheel-container">
                            <div class="wheel-pointer"></div>
                            <canvas id="wheel-canvas"></canvas>
                        </div>
                        <div class="wheel-controls">
                            <div class="bet-options">
                                <div class="bet-option" data-multiplier="2" data-color="red">
                                    <div class="color-indicator red"></div>
                                    <span>2x</span>
                                    <input type="number" value="0" min="0">
                                </div>
                                <div class="bet-option" data-multiplier="3" data-color="green">
                                    <div class="color-indicator green"></div>
                                    <span>3x</span>
                                    <input type="number" value="0" min="0">
                                </div>
                                <div class="bet-option" data-multiplier="5" data-color="blue">
                                    <div class="color-indicator blue"></div>
                                    <span>5x</span>
                                    <input type="number" value="0" min="0">
                                </div>
                                <div class="bet-option" data-multiplier="50" data-color="gold">
                                    <div class="color-indicator gold"></div>
                                    <span>50x</span>
                                    <input type="number" value="0" min="0">
                                </div>
                            </div>
                            <button class="bet-btn" id="wheel-spin-btn">Spin Wheel</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Toast Notifications -->
        <div class="toast-container" id="toast-container"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
